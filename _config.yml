title: infermark
description: ML Framework Inference Benchmark
theme: jekyll-theme-dinky
url: https://kvark.github.io
baseurl: /infermark

# Enable markdown inside HTML blocks (for tab panels).
kramdown:
  parse_block_html: true

# Render markdown files in models/ as pages.
include:
  - models
  - _includes

# Don't render framework source or Rust build artifacts.
exclude:
  - target
  - frameworks
  - harness
  - results
  - Cargo.toml
  - Cargo.lock
  - run.sh
  - "*.rs"
  - "*.py"
  - "*.sh"
  - .venv
  - .github
