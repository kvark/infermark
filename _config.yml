title: Inference Arena
description: Cross-framework, cross-platform ML training and inference benchmarks.
url: https://kvark.github.io
baseurl: /inferena

# Enable markdown inside HTML blocks (for tab panels).
kramdown:
  parse_block_html: true

# Render markdown files in models/ as pages.
include:
  - models

# Don't render framework source or Rust build artifacts.
exclude:
  - target
  - frameworks
  - harness
  - results
  - Cargo.toml
  - Cargo.lock
  - run.sh
  - "*.rs"
  - "*.py"
  - "*.sh"
  - .venv
  - .github
