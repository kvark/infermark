name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            packages: "infermark-harness infermark-candle infermark-burn infermark-luminal infermark-meganeura"
          - os: macos-latest
            name: macOS
            packages: "infermark-harness infermark-candle infermark-burn infermark-luminal infermark-meganeura"
          - os: windows-latest
            name: Windows
            # Burn (wgpu bleeding-edge) and Luminal have no Windows CI upstream.
            packages: "infermark-harness infermark-candle infermark-meganeura"
    runs-on: ${{ matrix.os }}
    name: Check (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}

      - name: Check packages
        shell: bash
        run: |
          for pkg in ${{ matrix.packages }}; do
            echo "::group::cargo check -p $pkg"
            cargo check -p "$pkg" || true
            echo "::endgroup::"
          done

  # Smoke test on Linux: Lavapipe (Vulkan SW renderer) + CPU frameworks.
  smoke-test-linux:
    runs-on: ubuntu-latest
    name: Smoke test (Linux)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-linux

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools cmake

      - name: Verify Vulkan (Lavapipe)
        run: vulkaninfo --summary || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build all Rust frameworks
        run: |
          cargo build --release -p infermark-harness
          cargo build --release -p infermark-candle || true
          cargo build --release -p infermark-burn || true
          cargo build --release -p infermark-luminal || true
          cargo build --release -p infermark-meganeura || true

      - name: Run SmolLM2-135M (CPU frameworks)
        run: |
          chmod +x frameworks/*/run.sh
          ./target/release/infermark --model SmolLM2-135M --frameworks candle,luminal,burn --root .
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-linux
          path: results/
          if-no-files-found: ignore

  # Smoke test on macOS: Metal (if available) + CPU frameworks.
  smoke-test-macos:
    runs-on: macos-latest
    name: Smoke test (macOS)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-macos

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Rust frameworks
        run: |
          cargo build --release -p infermark-harness
          cargo build --release -p infermark-candle || true
          cargo build --release -p infermark-burn || true
          cargo build --release -p infermark-meganeura || true

      - name: Run SmolLM2-135M
        run: |
          chmod +x frameworks/*/run.sh
          ./target/release/infermark --model SmolLM2-135M --frameworks candle,burn --root .
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-macos
          path: results/
          if-no-files-found: ignore
