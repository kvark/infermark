name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            # All Rust frameworks build on Linux.
            packages: "infermark-harness infermark-candle infermark-burn infermark-luminal infermark-meganeura"
          - os: macos-latest
            name: macOS
            packages: "infermark-harness infermark-candle infermark-burn infermark-luminal infermark-meganeura"
          - os: windows-latest
            name: Windows
            # Burn (wgpu bleeding-edge) and Luminal have no Windows CI upstream.
            packages: "infermark-harness infermark-candle infermark-meganeura"
    runs-on: ${{ matrix.os }}
    name: Check (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}

      - name: Check packages
        shell: bash
        run: |
          for pkg in ${{ matrix.packages }}; do
            echo "::group::cargo check -p $pkg"
            cargo check -p "$pkg" || true
            echo "::endgroup::"
          done

  # Smoke test: run frameworks that work on CPU / software renderers.
  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke test (Linux + Lavapipe)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke-test

      - name: Install Lavapipe and Vulkan tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: Verify Vulkan (Lavapipe)
        run: vulkaninfo --summary || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build harness
        run: cargo build --release -p infermark-harness

      # Build each framework independently; some may fail on CI.
      - name: Build burn
        run: cargo build --release -p infermark-burn
        continue-on-error: true

      - name: Build luminal
        run: cargo build --release -p infermark-luminal
        continue-on-error: true

      - name: Build meganeura
        run: cargo build --release -p infermark-meganeura
        continue-on-error: true

      # Run the harness with frameworks that work on CPU/Lavapipe.
      - name: Run benchmark (Luminal CPU)
        run: |
          chmod +x frameworks/*/run.sh
          ./target/release/infermark --model SmolLM2-135M --frameworks luminal --root .
        continue-on-error: true

      - name: Run benchmark (Burn wgpu/Lavapipe)
        run: ./target/release/infermark --model SmolLM2-135M --frameworks burn --root .
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/
          if-no-files-found: ignore
