name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "_config.yml"
      - "_layouts/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tab includes from model pages
        shell: bash
        run: |
          mkdir -p _includes
          for f in models/*.md; do
            name=$(basename "$f" .md | tr 'A-Z' 'a-z')
            model_name=$(basename "$f" .md)
            python3 - "$f" "$model_name" > "_includes/${name}.md" <<'PYEOF'
          import sys
          path, model_name = sys.argv[1], sys.argv[2]
          text = open(path).read()
          out = []
          parts = text.split('## ')
          for p in parts:
              if p.startswith('Results'):
                  out.append(p[len('Results'):].strip())
              elif p.startswith('Caveats'):
                  out.append('**Caveats:** ' + p[len('Caveats'):].strip())
          cmd = './run.sh -m ' + model_name
          out.append('**Run it yourself:** `git clone https://github.com/kvark/infermark && cd infermark && ' + cmd + '`')
          print('\n\n'.join(out))
          PYEOF
            echo "Generated _includes/${name}.md"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
