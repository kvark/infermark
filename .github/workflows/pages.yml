name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "_config.yml"
      - "_layouts/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tab includes from model pages
        run: |
          mkdir -p _includes
          for f in models/*.md; do
            name=$(basename "$f" .md | tr 'A-Z' 'a-z')
            # Extract from "## Results" up to (but not including) "## Architecture"
            sed -n '/^## Results$/,/^## Architecture$/{ /^## Architecture$/d; p; }' "$f" \
              | sed '1d' > "_includes/${name}.md"
            # Append Caveats as collapsible
            sed -n '/^## Caveats$/,/^## /{/^## [^C]/d; p;}' "$f" \
              | sed '1d' \
              | sed '1i <details><summary>Caveats</summary>\n' \
              | sed '$a \\n</details>' >> "_includes/${name}.md"
            echo "Generated _includes/${name}.md"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
