<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ page.title | default: site.title }}</title>
        {% seo %}
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                color: #333;
                background: #f5f5f5;
                font-size: 15px;
                line-height: 1.5;
            }
            a {
                color: #0366d6;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            /* Top bar */
            .topbar {
                background: #1a1a2e;
                color: #fff;
                padding: 14px 24px;
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .topbar h1 {
                font-size: 1.4em;
                font-weight: 700;
            }
            .topbar h1 a {
                color: #fff;
            }
            .topbar .subtitle {
                color: #aab;
                font-size: 0.85em;
            }
            .topbar .github-link {
                margin-left: auto;
                color: #aab;
                font-size: 0.85em;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .topbar .github-link:hover {
                color: #fff;
            }

            /* Main content */
            .content {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px 24px;
            }

            /* Tabs */
            .tabs {
                display: flex;
                gap: 0;
                border-bottom: 3px solid #1a1a2e;
                margin-bottom: 0;
            }
            .tabs input[type="radio"] {
                display: none;
            }
            .tabs label {
                padding: 10px 24px;
                cursor: pointer;
                font-weight: 600;
                font-size: 0.95em;
                background: #e8e8e8;
                color: #555;
                border: 1px solid #ccc;
                border-bottom: none;
                border-radius: 6px 6px 0 0;
                margin-bottom: -3px;
                margin-right: 2px;
            }
            .tabs label:hover {
                background: #ddd;
            }
            .tabs input[type="radio"]:checked + label {
                background: #fff;
                color: #1a1a2e;
                border-color: #1a1a2e;
                border-bottom-color: #fff;
            }
            .tab-panel {
                display: none;
                background: #fff;
                padding: 20px;
                border: 1px solid #ddd;
                border-top: none;
                border-radius: 0 0 6px 6px;
            }
            .tab-panel.active {
                display: block;
            }

            /* Tables — gpuinfo style */
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.9em;
                margin: 12px 0;
            }
            th {
                background: #1a1a2e;
                color: #fff;
                font-weight: 600;
                padding: 8px 12px;
                text-align: left;
                white-space: nowrap;
            }
            td {
                padding: 7px 12px;
                border-bottom: 1px solid #e0e0e0;
            }
            tr:nth-child(even) td {
                background: #f9f9f9;
            }
            tr:hover td {
                background: #e8f0fe;
            }
            td:nth-child(n + 3) {
                text-align: center;
                font-variant-numeric: tabular-nums;
            }
            /* Platform separator: applied via JS since CSS :empty doesn't work
       with markdown-rendered whitespace-only cells */
            tr.platform-start td {
                border-top: 3px solid #1a1a2e;
            }
            tr.platform-start td:first-child {
                font-weight: 600;
            }

            /* Markdown content in tabs */
            .tab-panel p {
                margin: 8px 0;
            }
            .tab-panel strong {
                color: #1a1a2e;
            }
            .tab-panel code {
                background: #f0f0f0;
                padding: 2px 6px;
                border-radius: 3px;
                font-size: 0.9em;
            }
            .tab-panel ul,
            .tab-panel ol {
                margin: 8px 0 8px 20px;
            }
            .tab-panel del {
                color: #999;
            }

            /* Framework filter bar */
            .framework-filter {
                display: flex;
                gap: 6px;
                align-items: center;
                flex-wrap: wrap;
                padding: 8px 12px;
                margin: 0 0 12px 0;
                background: #fafafa;
                border: 1px solid #e0e0e0;
                border-radius: 4px;
                font-size: 0.85em;
            }
            .framework-filter .filter-label {
                font-weight: 600;
                color: #555;
                margin-right: 6px;
            }
            .framework-filter label {
                cursor: pointer;
                padding: 2px 8px;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                border-radius: 3px;
                user-select: none;
            }
            .framework-filter label:hover {
                background: #e8f0fe;
            }
            .framework-filter label.no-data {
                color: #b0b0b0;
            }
            .framework-filter button {
                margin-left: auto;
                padding: 2px 10px;
                font-size: 0.9em;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 3px;
                color: #555;
                cursor: pointer;
            }
            .framework-filter button:hover {
                background: #eef;
            }
            tr.filtered-out {
                display: none;
            }

            /* Visual charts */
            .charts-block {
                margin: 0 0 16px 0;
                border: 1px solid #ddd;
                border-radius: 4px;
                background: #fff;
            }
            .charts-block > summary {
                cursor: pointer;
                padding: 8px 12px;
                font-weight: 600;
                color: #1a1a2e;
                background: #fafafa;
                border-radius: 4px 4px 0 0;
                user-select: none;
            }
            .charts-block > summary:hover {
                background: #f0f0f4;
            }
            .charts-block[open] > summary {
                border-bottom: 1px solid #ddd;
            }
            .charts-block .platform-section {
                padding: 12px 14px;
                border-bottom: 1px solid #eee;
            }
            .charts-block .platform-section:last-child {
                border-bottom: none;
            }
            .charts-block .platform-section h4 {
                font-size: 0.95em;
                margin: 0 0 6px 0;
                color: #1a1a2e;
                font-weight: 600;
            }
            .charts-grid {
                display: block;
            }
            .metric-chart {
                width: 100%;
                height: auto;
                font-size: 11px;
                font-family: inherit;
            }
            .metric-chart .fw-label {
                fill: #333;
            }
            .metric-chart .value {
                fill: #555;
                font-variant-numeric: tabular-nums;
            }
            .metric-chart .bar.inference {
                fill: #4a7ea8;
            }
            .metric-chart .bar.training {
                fill: #f0b849;
            }
            .metric-chart .bar.inference.divergent {
                fill: #c8d4e0;
            }
            .metric-chart .bar.training.divergent {
                fill: #ecdcb8;
            }
            .metric-chart .axis-line {
                stroke: #ccc;
                stroke-width: 0.5;
            }
            .metric-chart .tick-label {
                fill: #999;
                font-size: 9px;
            }
            .chart-legend {
                display: flex;
                gap: 16px;
                align-items: center;
                flex-wrap: wrap;
                padding: 6px 14px;
                font-size: 0.8em;
                color: #666;
                background: #fafafa;
                border-bottom: 1px solid #eee;
            }
            .chart-legend .swatch {
                display: inline-block;
                width: 12px;
                height: 10px;
                border-radius: 2px;
                margin-right: 4px;
                vertical-align: middle;
            }
            .chart-legend .swatch.inference { background: #4a7ea8; }
            .chart-legend .swatch.training { background: #f0b849; }

            /* Pareto scatter */
            .pareto-chart {
                width: 100%;
                height: auto;
                font-size: 10px;
                font-family: inherit;
            }
            .pareto-chart .axis-line,
            .pareto-chart .grid-line {
                stroke: #ddd;
                stroke-width: 0.5;
            }
            .pareto-chart .axis-label {
                fill: #555;
                font-weight: 600;
                font-size: 9px;
            }
            .pareto-chart .tick-label {
                fill: #999;
                font-size: 8px;
            }
            .pareto-chart .threshold {
                stroke: #2e7d32;
                stroke-width: 0.5;
                stroke-dasharray: 3 2;
                opacity: 0.6;
            }
            .pareto-chart .threshold-label {
                fill: #2e7d32;
                font-size: 8px;
                opacity: 0.8;
            }
            .pareto-chart .point-label {
                fill: #333;
                font-size: 9px;
            }
            .pareto-chart .point {
                stroke: #fff;
                stroke-width: 1;
            }
            .pareto-chart .point.matching { fill: #2e7d32; }
            .pareto-chart .point.borderline { fill: #ed6c02; }
            .pareto-chart .point.divergent { fill: #c62828; }
            .pareto-chart .point.reference { fill: #1a1a2e; }

            /* Legend bar */
            .legend {
                display: flex;
                gap: 24px;
                align-items: center;
                flex-wrap: wrap;
                padding: 10px 20px;
                background: #fff;
                border: 1px solid #ddd;
                border-top: none;
                margin-bottom: 20px;
                font-size: 0.85em;
                color: #666;
            }
            .legend span {
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }

            /* Footer */
            footer {
                text-align: center;
                padding: 20px;
                font-size: 0.8em;
                color: #999;
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <h1><a href="https://inferena.tech">Inference Arena</a></h1>
            <a class="github-link" href="https://github.com/kvark/inferena">
                <svg
                    height="16"
                    width="16"
                    viewBox="0 0 16 16"
                    fill="currentColor"
                >
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                    />
                </svg>
                View on GitHub
            </a>
        </div>

        <div class="content">
            {{ content }}

            <div class="legend">
                <span><strong>Legend:</strong></span>
                <span
                    ><strong>Bold</strong> = best among matching
                    frameworks</span
                >
                <span
                    ><del>Struck through</del> = different / simplified
                    model</span
                >
                <span><strong>✗</strong> = not supported</span>
                <span>Framework names link to tested revision</span>
            </div>
        </div>

        <footer>
            <a href="https://github.com/kvark/inferena">inferena</a> · Hosted on
            GitHub Pages
        </footer>

        <script>
            // Tab switching.
            document
                .querySelectorAll('.tabs input[type="radio"]')
                .forEach(function (r) {
                    r.addEventListener("change", function () {
                        document
                            .querySelectorAll(".tab-panel")
                            .forEach(function (p) {
                                p.classList.remove("active");
                            });
                        document
                            .getElementById(r.value)
                            .classList.add("active");
                    });
                });

            // Framework filter — client-side hide/show per model tab.
            //
            // The rendered markdown tables are flat: the first data cell is
            // the platform name on the first row of each group, empty on
            // continuation rows. Filtering can hide the platform-start row,
            // so we also re-assign platform labels to the first visible
            // row of each group.
            (function () {
                function slugify(s) {
                    return s.trim().toLowerCase().split(/\s+/)[0].replace(/[^a-z0-9.]/g, "");
                }
                function frameworkFromCell(td) {
                    var link = td.querySelector("a");
                    var text = (link ? link.textContent : td.textContent).trim();
                    // "PyTorch 2.11.0+cu130" → "pytorch", "ONNX Runtime" → "onnx",
                    // "llama.cpp" → "llama.cpp". Good enough to group versions.
                    return { slug: slugify(text), label: text.split(/\s+/)[0] };
                }

                // 1) Tag every row with its platform and framework.
                var frameworkLabel = {}; // slug -> display name
                document.querySelectorAll(".tab-panel").forEach(function (panel) {
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        var cells = tr.querySelectorAll("td");
                        if (cells.length < 2) return;
                        var plat = cells[0].textContent.trim();
                        if (plat) tr.dataset.platformOrig = plat;
                        var fw = frameworkFromCell(cells[1]);
                        tr.dataset.framework = fw.slug;
                        if (!(fw.slug in frameworkLabel)) frameworkLabel[fw.slug] = fw.label;
                    });
                    // Forward-fill platform so continuation rows know their group.
                    var cur = "";
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        if (tr.dataset.platformOrig) cur = tr.dataset.platformOrig;
                        tr.dataset.platform = cur;
                    });
                });

                function storageKey(panelId) {
                    return "inferena:fw:" + panelId;
                }
                function loadState(panelId) {
                    try {
                        var s = localStorage.getItem(storageKey(panelId));
                        if (s) return new Set(JSON.parse(s));
                    } catch (e) {}
                    return null;
                }
                function saveState(panelId, set) {
                    try {
                        localStorage.setItem(storageKey(panelId), JSON.stringify(Array.from(set)));
                    } catch (e) {}
                }

                function applyFilter(panel) {
                    var selected = new Set();
                    panel.querySelectorAll('.framework-filter input[type="checkbox"]').forEach(
                        function (cb) { if (cb.checked) selected.add(cb.value); }
                    );
                    saveState(panel.id, selected);
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        var show = selected.has(tr.dataset.framework);
                        tr.classList.toggle("filtered-out", !show);
                    });
                    // Reassign platform-start and inject labels where needed.
                    var prev = null;
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        if (tr.classList.contains("filtered-out")) return;
                        var plat = tr.dataset.platform;
                        var firstTd = tr.querySelector("td:first-child");
                        if (plat !== prev) {
                            tr.classList.add("platform-start");
                            if (!firstTd.textContent.trim()) {
                                firstTd.textContent = plat;
                                firstTd.dataset.injected = "1";
                            }
                        } else {
                            tr.classList.remove("platform-start");
                            if (firstTd.dataset.injected === "1") {
                                firstTd.textContent = "";
                                delete firstTd.dataset.injected;
                            }
                        }
                        prev = plat;
                    });
                    renderCharts(panel, selected);
                    renderPareto(panel, selected);
                }

                // Table columns: 0=Platform, 1=Framework, 2=Compile, 3=Inference,
                // 4=Latency, 5=Training, 6=Loss. The visual comparison focuses
                // on runtime cost — inference as the base bar, with training
                // extending it — so compile and latency are deliberately
                // omitted here. Loss is for the Pareto view.
                var COL_INFERENCE = 3;
                var COL_TRAINING = 5;
                var COL_LOSS = 6;

                function parseCell(td) {
                    // Returns { value, divergent, missing }. Missing means no
                    // numeric reading (—, ✗, blank). Divergent means the row
                    // was struck through (different model).
                    var text = td.textContent.trim();
                    if (!text || text === "—" || text === "✗") {
                        return { value: null, divergent: false, missing: true };
                    }
                    var divergent = td.querySelector("del") !== null;
                    var m = text.match(/[-+]?\d+(?:\.\d+)?(?:e[-+]?\d+)?/);
                    if (!m) return { value: null, divergent: divergent, missing: true };
                    return { value: parseFloat(m[0]), divergent: divergent, missing: false };
                }

                function collectPlatformData(panel, selected) {
                    // Returns [{ platform, rows: [{fw, label, inference, training, divergent}], sortKey }]
                    var platforms = [];
                    var byPlat = {};
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        var fw = tr.dataset.framework;
                        if (!fw || !selected.has(fw)) return;
                        var plat = tr.dataset.platform;
                        if (!byPlat[plat]) {
                            byPlat[plat] = { platform: plat, rows: [] };
                            platforms.push(byPlat[plat]);
                        }
                        var cells = tr.querySelectorAll("td");
                        var inf = parseCell(cells[COL_INFERENCE]);
                        var trn = parseCell(cells[COL_TRAINING]);
                        // A row is "divergent" when its inference cell is struck
                        // through; training may legitimately be missing.
                        byPlat[plat].rows.push({
                            fw: fw,
                            label: frameworkLabel[fw],
                            inference: inf,
                            training: trn,
                            divergent: inf.divergent,
                        });
                    });
                    // Sort platforms by best non-divergent inference time —
                    // fastest platform first. Platforms with no numeric
                    // inference data go to the end.
                    platforms.forEach(function (p) {
                        var best = Infinity;
                        p.rows.forEach(function (r) {
                            if (r.divergent) return;
                            if (r.inference.missing || r.inference.value == null) return;
                            if (r.inference.value > 0 && r.inference.value < best) best = r.inference.value;
                        });
                        p.sortKey = best;
                    });
                    platforms.sort(function (a, b) {
                        if (a.sortKey === b.sortKey) return a.platform.localeCompare(b.platform);
                        return a.sortKey - b.sortKey;
                    });
                    return platforms;
                }

                function formatValue(v) {
                    if (v == null) return "";
                    if (v >= 1000) return v.toFixed(0);
                    if (v >= 100) return v.toFixed(0);
                    if (v >= 10) return v.toFixed(1);
                    if (v >= 1) return v.toFixed(2);
                    return v.toFixed(3);
                }

                function svgStackedBar(p) {
                    // One row per framework, bar = [0..inf] blue + [inf..train] yellow.
                    // Linear scale so the yellow extension is proportional to
                    // (training - inference) as asked for.
                    var rows = p.rows;
                    if (rows.length === 0) return "";

                    // Scale from matching frameworks only — divergent runs (a
                    // slow CPU fallback, a simplified model) can be orders of
                    // magnitude larger and would squash everything else. Their
                    // bars are clipped to the right edge but the numeric label
                    // still shows the real value. Fall back to all rows if
                    // every framework on this platform is divergent.
                    var vmax = 0;
                    var sawMatching = false;
                    rows.forEach(function (r) {
                        if (r.divergent) return;
                        if (!r.inference.missing && r.inference.value != null && r.inference.value > vmax) {
                            vmax = r.inference.value; sawMatching = true;
                        }
                        if (!r.training.missing && r.training.value != null && r.training.value > vmax) {
                            vmax = r.training.value; sawMatching = true;
                        }
                    });
                    if (!sawMatching) {
                        rows.forEach(function (r) {
                            if (!r.inference.missing && r.inference.value != null && r.inference.value > vmax) vmax = r.inference.value;
                            if (!r.training.missing && r.training.value != null && r.training.value > vmax) vmax = r.training.value;
                        });
                    }
                    if (vmax === 0) return "";
                    vmax *= 1.04;

                    var rowH = 18;
                    var labelW = 90;
                    var valueW = 84;
                    var chartW = 620;
                    var barX = labelW;
                    var barW = chartW - labelW - valueW;
                    var topPad = 4;
                    var axisH = 16;
                    var chartH = topPad + rows.length * rowH + axisH;

                    var parts = [];
                    parts.push('<svg class="metric-chart" viewBox="0 0 ' + chartW + ' ' + chartH +
                        '" preserveAspectRatio="xMinYMin meet" role="img" aria-label="' +
                        p.platform + ' inference and training times">');
                    rows.forEach(function (r, i) {
                        var y = topPad + i * rowH;
                        parts.push('<text class="fw-label" x="' + (labelW - 6) + '" y="' +
                            (y + 13) + '" text-anchor="end">' + r.label + '</text>');
                        var hasInf = !r.inference.missing && r.inference.value != null;
                        var hasTrn = !r.training.missing && r.training.value != null && r.training.value > 0;
                        if (!hasInf) {
                            parts.push('<text class="value" x="' + (chartW - 4) + '" y="' +
                                (y + 13) + '" text-anchor="end" opacity="0.4">—</text>');
                            return;
                        }
                        // Inference bar, clipped to the chart edge so off-scale
                        // divergent runs don't balloon the layout.
                        var infV = r.inference.value;
                        var infWraw = Math.max(1.5, (infV / vmax) * barW);
                        var infW = Math.min(infWraw, barW);
                        var infCls = "bar inference" + (r.divergent ? " divergent" : "");
                        parts.push('<rect class="' + infCls + '" x="' + barX + '" y="' +
                            (y + 4) + '" width="' + infW.toFixed(1) + '" height="11" rx="1.5"/>');
                        // Training extension, only if strictly longer than inference.
                        if (hasTrn && r.training.value > infV) {
                            var trnStart = barX + infW;
                            var trnEndRaw = barX + (r.training.value / vmax) * barW;
                            var trnEnd = Math.min(trnEndRaw, barX + barW);
                            var trnW = Math.max(0, trnEnd - trnStart);
                            if (trnW > 0.5) {
                                var trnCls = "bar training" + (r.divergent ? " divergent" : "");
                                parts.push('<rect class="' + trnCls + '" x="' + trnStart.toFixed(1) +
                                    '" y="' + (y + 4) + '" width="' + trnW.toFixed(1) +
                                    '" height="11" rx="1.5"/>');
                            }
                        }
                        // Numeric labels to the right of the bar.
                        var txt = formatValue(infV) + (hasTrn ? " / " + formatValue(r.training.value) : "");
                        parts.push('<text class="value" x="' + (chartW - 4) + '" y="' +
                            (y + 13) + '" text-anchor="end">' + txt + " ms</text>");
                    });
                    // Axis baseline with 0 / half / max ticks.
                    var ay = topPad + rows.length * rowH + 2;
                    parts.push('<line class="axis-line" x1="' + barX + '" y1="' + ay +
                        '" x2="' + (barX + barW) + '" y2="' + ay + '"/>');
                    parts.push('<text class="tick-label" x="' + barX + '" y="' + (ay + 11) + '">0</text>');
                    parts.push('<text class="tick-label" x="' + (barX + barW / 2) + '" y="' +
                        (ay + 11) + '" text-anchor="middle">' + formatValue(vmax / 2) + '</text>');
                    parts.push('<text class="tick-label" x="' + (barX + barW) + '" y="' +
                        (ay + 11) + '" text-anchor="end">' + formatValue(vmax) + ' ms</text>');
                    parts.push("</svg>");
                    return parts.join("");
                }

                function renderCharts(panel, selected) {
                    var block = panel.querySelector(".charts-block");
                    if (!block) return;
                    var body = block.querySelector(".charts-body");
                    var platforms = collectPlatformData(panel, selected);
                    if (platforms.length === 0) {
                        body.innerHTML = '<div style="padding:12px 14px;color:#999;font-size:0.85em">' +
                            "No frameworks selected.</div>";
                        return;
                    }
                    var legend = '<div class="chart-legend">' +
                        '<span><span class="swatch inference"></span>Inference</span>' +
                        '<span><span class="swatch training"></span>Training (extension)</span>' +
                        '<span><strong>Lower is better</strong> — shorter bar = faster</span>' +
                        '<span style="margin-left:auto">Platforms sorted fastest first</span>' +
                        '</div>';
                    var html = legend + platforms.map(function (p) {
                        var chart = svgStackedBar(p);
                        if (!chart) return "";
                        return '<div class="platform-section"><h4>' + p.platform + '</h4>' + chart + "</div>";
                    }).filter(Boolean).join("");
                    body.innerHTML = html;
                }

                function buildChartsBlock(panel) {
                    var block = document.createElement("details");
                    block.className = "charts-block";
                    block.open = true;
                    var summary = document.createElement("summary");
                    summary.textContent = "Visual comparison";
                    block.appendChild(summary);
                    var body = document.createElement("div");
                    body.className = "charts-body";
                    block.appendChild(body);
                    return block;
                }

                // ---- Pareto scatter: speed vs correctness ----
                //
                // Mirrors the harness's CLOSE threshold: rel_loss = |L - L_pt| /
                // max(|L_pt|, 1). A framework lands in the bottom-left quadrant
                // when it's both fast (low inference_ms) and correct (low
                // rel_loss). The 0.05/0.10 dashed lines match the harness's
                // own CLOSE / borderline bands.
                function collectParetoData(panel, selected) {
                    var platforms = [];
                    var byPlat = {};
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        var fw = tr.dataset.framework;
                        if (!fw || !selected.has(fw)) return;
                        var plat = tr.dataset.platform;
                        if (!byPlat[plat]) {
                            byPlat[plat] = { platform: plat, rows: [] };
                            platforms.push(byPlat[plat]);
                        }
                        var cells = tr.querySelectorAll("td");
                        byPlat[plat].rows.push({
                            fw: fw,
                            label: frameworkLabel[fw],
                            inference: parseCell(cells[3]),
                            loss: parseCell(cells[6]),
                        });
                    });
                    platforms.forEach(function (p) {
                        var pt = p.rows.find(function (r) { return r.fw === "pytorch"; });
                        p.pytorchLoss = pt && pt.loss && !pt.loss.missing ? pt.loss.value : null;
                        p.rows.forEach(function (r) {
                            if (p.pytorchLoss != null && !r.loss.missing && r.loss.value != null) {
                                var norm = Math.max(Math.abs(p.pytorchLoss), 1);
                                r.relLoss = Math.abs(r.loss.value - p.pytorchLoss) / norm;
                            } else {
                                r.relLoss = null;
                            }
                        });
                    });
                    return platforms.filter(function (p) { return p.pytorchLoss != null; });
                }

                function svgParetoScatter(p) {
                    // Points worth plotting.
                    var pts = p.rows.filter(function (r) {
                        return !r.inference.missing && r.inference.value != null &&
                               r.inference.value > 0 && r.relLoss != null;
                    });
                    if (pts.length === 0) return "";

                    var W = 340, H = 220;
                    var padL = 42, padR = 12, padT = 14, padB = 28;
                    var plotW = W - padL - padR;
                    var plotH = H - padT - padB;

                    // X: inference_ms, log scale. Use a min that is a power of 10
                    // below the smallest observed value.
                    var xs = pts.map(function (r) { return r.inference.value; });
                    var xMin = Math.pow(10, Math.floor(Math.log10(Math.min.apply(null, xs))));
                    var xMax = Math.pow(10, Math.ceil(Math.log10(Math.max.apply(null, xs))));
                    if (xMax === xMin) xMax = xMin * 10;

                    // Y: relLoss. Capped at the larger of 1.0 and the biggest
                    // observed value (rounded up).
                    var maxRel = Math.max.apply(null, pts.map(function (r) { return r.relLoss; }));
                    var yMax = Math.max(1.0, Math.ceil(Math.min(maxRel, 10) * 10) / 10);

                    function xPix(v) {
                        var f = (Math.log10(Math.max(v, xMin)) - Math.log10(xMin)) /
                                (Math.log10(xMax) - Math.log10(xMin));
                        return padL + f * plotW;
                    }
                    function yPix(v) {
                        var f = Math.min(v, yMax) / yMax;
                        return padT + (1 - f) * plotH;
                    }

                    var parts = [];
                    parts.push('<svg class="pareto-chart" viewBox="0 0 ' + W + ' ' + H +
                        '" preserveAspectRatio="xMinYMin meet" role="img" aria-label="Speed vs loss divergence">');

                    // Axes + gridlines at decade ticks.
                    parts.push('<line class="axis-line" x1="' + padL + '" y1="' + (padT + plotH) +
                        '" x2="' + (padL + plotW) + '" y2="' + (padT + plotH) + '"/>');
                    parts.push('<line class="axis-line" x1="' + padL + '" y1="' + padT +
                        '" x2="' + padL + '" y2="' + (padT + plotH) + '"/>');
                    var decade = xMin;
                    while (decade <= xMax + 1e-9) {
                        var x = xPix(decade);
                        parts.push('<line class="grid-line" x1="' + x + '" y1="' + padT +
                            '" x2="' + x + '" y2="' + (padT + plotH) + '"/>');
                        parts.push('<text class="tick-label" x="' + x + '" y="' + (padT + plotH + 10) +
                            '" text-anchor="middle">' + formatValue(decade) + '</text>');
                        decade *= 10;
                    }
                    // Y ticks at 0, yMax/2, yMax.
                    [0, yMax / 2, yMax].forEach(function (yv) {
                        var y = yPix(yv);
                        parts.push('<line class="grid-line" x1="' + padL + '" y1="' + y +
                            '" x2="' + (padL + plotW) + '" y2="' + y + '"/>');
                        parts.push('<text class="tick-label" x="' + (padL - 4) + '" y="' + (y + 3) +
                            '" text-anchor="end">' + yv.toFixed(2) + '</text>');
                    });
                    // Threshold bands: 0.05 (CLOSE) and 0.10 (borderline).
                    [0.05, 0.10].forEach(function (t) {
                        if (t < yMax) {
                            var y = yPix(t);
                            parts.push('<line class="threshold" x1="' + padL + '" y1="' + y +
                                '" x2="' + (padL + plotW) + '" y2="' + y + '"/>');
                        }
                    });
                    if (0.05 < yMax) {
                        parts.push('<text class="threshold-label" x="' + (padL + plotW - 2) +
                            '" y="' + (yPix(0.05) - 2) + '" text-anchor="end">CLOSE (≤0.05)</text>');
                    }

                    // Axis labels.
                    parts.push('<text class="axis-label" x="' + (padL + plotW / 2) + '" y="' +
                        (H - 4) + '" text-anchor="middle">Inference (ms, log)</text>');
                    parts.push('<text class="axis-label" transform="translate(10 ' +
                        (padT + plotH / 2) + ') rotate(-90)" text-anchor="middle">|Δ loss / ref|</text>');

                    // Points.
                    pts.forEach(function (r) {
                        var x = xPix(r.inference.value);
                        var y = yPix(r.relLoss);
                        var cls = "point";
                        if (r.fw === "pytorch") cls += " reference";
                        else if (r.relLoss <= 0.05) cls += " matching";
                        else if (r.relLoss <= 0.10) cls += " borderline";
                        else cls += " divergent";
                        parts.push('<circle class="' + cls + '" cx="' + x.toFixed(1) +
                            '" cy="' + y.toFixed(1) + '" r="4"/>');
                        parts.push('<text class="point-label" x="' + (x + 6).toFixed(1) + '" y="' +
                            (y + 3).toFixed(1) + '">' + r.label + '</text>');
                    });
                    parts.push("</svg>");
                    return parts.join("");
                }

                function renderPareto(panel, selected) {
                    var block = panel.querySelector(".pareto-block");
                    if (!block) return;
                    var body = block.querySelector(".charts-body");
                    var platforms = collectParetoData(panel, selected);
                    if (platforms.length === 0) {
                        body.innerHTML = '<div style="padding:12px 14px;color:#999;font-size:0.85em">' +
                            "No PyTorch reference visible — enable PyTorch to see divergence.</div>";
                        return;
                    }
                    body.innerHTML = platforms.map(function (p) {
                        var svg = svgParetoScatter(p);
                        if (!svg) return "";
                        return '<div class="platform-section"><h4>' + p.platform +
                            '</h4>' + svg + "</div>";
                    }).filter(Boolean).join("");
                }

                function buildParetoBlock() {
                    var block = document.createElement("details");
                    block.className = "charts-block pareto-block";
                    var summary = document.createElement("summary");
                    summary.textContent = "Speed vs correctness";
                    block.appendChild(summary);
                    var body = document.createElement("div");
                    body.className = "charts-body";
                    block.appendChild(body);
                    return block;
                }

                // 2) Build filter bar per panel.
                document.querySelectorAll(".tab-panel").forEach(function (panel) {
                    var fws = new Set();
                    // Frameworks that produced at least one numeric row. A
                    // framework whose every row is ✗ on this platform adds
                    // noise to the filter and the charts; default to off but
                    // keep the checkbox so users can still enable it.
                    var fwHasData = {};
                    panel.querySelectorAll("table tbody tr").forEach(function (tr) {
                        if (!tr.dataset.framework) return;
                        fws.add(tr.dataset.framework);
                        var cells = tr.querySelectorAll("td");
                        // Any numeric cell in cols 2..6 counts as "has data".
                        for (var i = 2; i <= 6; i++) {
                            if (i >= cells.length) break;
                            var t = cells[i].textContent.trim();
                            if (t && t !== "—" && t !== "✗" && /\d/.test(t)) {
                                fwHasData[tr.dataset.framework] = true;
                                break;
                            }
                        }
                    });
                    if (fws.size === 0) return;
                    var bar = document.createElement("div");
                    bar.className = "framework-filter";
                    var lbl = document.createElement("span");
                    lbl.className = "filter-label";
                    lbl.textContent = "Frameworks:";
                    bar.appendChild(lbl);
                    var saved = loadState(panel.id);
                    Array.from(fws).sort().forEach(function (fw) {
                        var l = document.createElement("label");
                        var cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.value = fw;
                        // Saved state wins over defaults. Otherwise: on if the
                        // framework has at least one numeric row in this tab.
                        if (saved) {
                            cb.checked = saved.has(fw);
                        } else {
                            cb.checked = !!fwHasData[fw];
                        }
                        if (!fwHasData[fw]) l.classList.add("no-data");
                        cb.addEventListener("change", function () { applyFilter(panel); });
                        l.appendChild(cb);
                        l.appendChild(document.createTextNode(frameworkLabel[fw]));
                        bar.appendChild(l);
                    });
                    var reset = document.createElement("button");
                    reset.type = "button";
                    reset.textContent = "All";
                    reset.addEventListener("click", function () {
                        bar.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
                            cb.checked = true;
                        });
                        applyFilter(panel);
                    });
                    bar.appendChild(reset);
                    panel.insertBefore(bar, panel.firstChild);
                    // Insert chart blocks after the filter bar, before the table.
                    var charts = buildChartsBlock(panel);
                    var pareto = buildParetoBlock();
                    panel.insertBefore(charts, bar.nextSibling);
                    panel.insertBefore(pareto, charts.nextSibling);
                    applyFilter(panel);
                });
            })();
        </script>
    </body>
</html>
