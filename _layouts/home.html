<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="stylesheet" href="https://pages-themes.github.io/dinky/assets/css/style.css">
  <style>
    /* Tab styling */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #aaa;
      margin-bottom: 0;
    }
    .tabs input[type="radio"] { display: none; }
    .tabs label {
      padding: 10px 24px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      border: 2px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: #f0f0f0;
      margin-bottom: -2px;
      color: #555;
    }
    .tabs input[type="radio"]:checked + label {
      background: #fff;
      border-color: #aaa;
      color: #222;
    }
    .tab-content {
      display: none;
      padding: 20px 0;
    }
    .tab-content.active {
      display: block;
    }
    /* Tables */
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f5f5f5; }
    td:nth-child(n+3) { text-align: center; }
    /* Legend */
    .legend { font-size: 0.9em; color: #666; margin-top: 1em; }
    .legend li { margin-bottom: 0.3em; }
  </style>
</head>
<body>
  <div id="container">
    <div class="inner">
      <header>
        <h1>{{ site.title }}</h1>
        <h2>{{ site.description }}</h2>
      </header>
      <section id="main_content">
        {{ content }}
      </section>
      <footer>
        <p><a href="https://github.com/kvark/infermark">Source on GitHub</a></p>
      </footer>
    </div>
  </div>
  <script>
    // Tab switching.
    document.querySelectorAll('.tabs input[type="radio"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        document.querySelectorAll('.tab-content').forEach(function(tc) {
          tc.classList.remove('active');
        });
        document.getElementById(radio.value).classList.add('active');
      });
    });
  </script>
</body>
</html>
